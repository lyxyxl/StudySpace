<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <!-- http://getbootstrap.com/docs/5.3/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

        <!-- https://favicon.io/emoji-favicons/growing-heart -->
        <!-- https://favicon.io/emoji-favicons/herb/ -->
        <!-- https://favicon.io/emoji-favicons/magnifying-glass-tilted-left/ -->
        <link href="/static/faviconheart.ico?v=2" rel="icon" type="image/x-icon" />

        <!-- Frank Ruhl Libre font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Frank+Ruhl+Libre:wght@300..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">

        <!-- Inter font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@100..900&display=swap" rel="stylesheet">

        <!-- Courier font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

        <link href="/static/styles.css" rel="stylesheet">


        <title>{% block title %}{% endblock %}</title>
    </head>


    <body>

        <nav class="border navbar navbar-expand-md navbar-light" style="background-color: #ffffff">
            <div class="container-fluid">
                <div style="height: 20px; width: 20px; border-radius: 0.25em; flex-shrink: 0; margin-right: 6px;">
                    <div style="width: 100%; height: 100%;">
                        <img src="/static/faviconheart.ico?v=2" style="display: block; object-fit: cover; border-radius: 4px; width: 17.76px; height: 17.76px; transition: opacity 100ms ease-out 0s;">
                    </div>
                </div>
                <a class="navbar-brand" href="/">| Study Space</a>

                <button aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler" data-bs-target="#navbar" data-bs-toggle="collapse" type="button">
                    <span class="navbar-toggler-icon" style="height: 40px"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbar" style="font-family:'Inter', sans-serif; font-weight: lighter">
                    {% if session["user_id"] %}
                        <ul class="navbar-nav ms-auto mt-2">
                            <li class="nav-item"><a class="nav-link" href="/logout">Log Out</a></li>
                        </ul>
                    {% else %}
                        <ul class="navbar-nav ms-auto mt-2">
                            <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
                            <li class="nav-item"><a class="nav-link" href="/login">Log In</a></li>
                        </ul>
                    {% endif %}
                </div>
            </div>
        </nav>

        {% block main %}{% endblock %}

        <footer class="mb-5">

        </footer>




    </body>

</html>
